<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío de los 12 Niveles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>Nivel Actual: <span id="level-number">1</span>/12</h1>
        <div class="map-visual">
            <!-- Aquí podrías dibujar círculos o una barra de progreso -->
            <div id="progress-bar"></div>
        </div>
        <button id="open-challenge">Abrir Desafío</button>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="question-text">Pregunta aquí</h2>
            <div class="options">
                <button class="option-btn" id="opt-1"></button>
                <button class="option-btn" id="opt-2"></button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
